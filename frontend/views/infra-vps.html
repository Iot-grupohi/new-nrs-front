<header class="page-header page-header--infra">
  <div class="page-header__head">
    <nav class="page-header__nav" aria-label="Navegação da página">
      <button type="button" class="page-header__back" data-page-back="dashboard">← Painel LAV60</button>
    </nav>
    <h1 class="page-header__title">VPS</h1>
    <p class="page-header__subtitle" id="infraMetricsSubtitle">DigitalOcean</p>
  </div>
  <div class="page-header__actions page-header__actions--infra">
    <label class="infra-period-select" for="infraMetricsPeriod">
      <span class="infra-period-select__label">Período</span>
      <select id="infraMetricsPeriod" class="infra-period-select__input" aria-label="Período do gráfico"></select>
    </label>
    <button type="button" class="btn btn--sm btn--ghost" id="btnInfraRefresh">Atualizar</button>
  </div>
</header>

<main class="main-content main-content--infra-metrics">
  <section class="records-audit-banner hidden" id="infraMetricsBanner" role="alert"></section>

  <div class="infra-vps-toolbar panel">
    <div class="infra-vps-toolbar__row">
      <div class="infra-vps-tabs" id="infraVpsTabs" role="tablist" aria-label="VPS cadastradas"></div>
      <form class="infra-vps-add" id="infraVpsAddForm">
        <label class="infra-vps-add__label" for="infraVpsAddId">Adicionar VPS</label>
        <div class="infra-vps-add__row">
          <input type="text" id="infraVpsAddId" class="infra-vps-add__input" inputmode="numeric" pattern="[0-9]+" placeholder="ID DigitalOcean" autocomplete="off">
          <button type="submit" class="btn btn--sm btn--primary">Adicionar</button>
        </div>
      </form>
    </div>
    <p class="infra-metrics-toolbar__meta" id="infraMetricsMeta">—</p>
    <div class="infra-toolbar-info hidden" id="infraVpsToolbarInfo" aria-live="polite"></div>
  </div>

  <section class="infra-kpi-section hidden" id="infraKpiSection" aria-label="Resumo da VPS">
    <div class="infra-kpi-grid" id="infraKpiGrid"></div>
  </section>

  <div id="infraMetricsLoading" class="credit-reports-content-loading hidden" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p>Consultando métricas da VPS…</p>
  </div>

  <section class="infra-metrics-panel" id="infraPanelVps" aria-label="Métricas VPS">
    <div class="infra-metrics-grid" id="infraVpsGrid"></div>
    <p class="infra-metrics-empty hidden" id="infraVpsEmpty">Nenhuma VPS cadastrada.</p>
  </section>
</main>
