<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LAV60 — Painel</title>
  <link rel="stylesheet" href="app.css?v=24">
</head>
<body class="page-panel page-dashboard auth-pending">
  <div class="app-layout">
    <aside class="sidebar" aria-label="Menu principal">
      <div class="sidebar__brand">
        <span class="sidebar__logo" aria-hidden="true">L60</span>
        <div class="sidebar__identity">
          <strong class="sidebar__title">LAV60</strong>
          <span class="sidebar__eyebrow">Painel central</span>
        </div>
      </div>
      <nav class="sidebar__nav" aria-label="Navegação">
        <a href="index.html" class="sidebar__link sidebar__link--active" data-route="dashboard" aria-current="page">
          <span class="sidebar__icon" aria-hidden="true">▣</span>
          <span class="sidebar__label">Dashboard</span>
        </a>
        <a href="index.html#/lojas" class="sidebar__link" data-route="lojas">
          <span class="sidebar__icon" aria-hidden="true">◫</span>
          <span class="sidebar__label">Lojas</span>
        </a>
        <a href="index.html#/registros" class="sidebar__link" data-route="registros">
          <span class="sidebar__icon" aria-hidden="true">☰</span>
          <span class="sidebar__label">Registros</span>
        </a>
      </nav>
      <div class="sidebar__footer" id="sidebarUser"></div>
    </aside>

    <div class="app-main">
      <div class="app-view" id="appView" aria-live="polite"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <div id="storeChannelModal" class="store-channel-modal hidden" role="dialog" aria-modal="true" aria-labelledby="storeChannelTitle">
    <div class="store-channel-modal__backdrop" data-channel-dismiss tabindex="-1"></div>
    <div class="store-channel-modal__panel">
      <header class="store-channel-modal__head">
        <div class="store-channel-modal__intro">
          <span class="store-channel-modal__eyebrow">Canal de operação</span>
          <h2 id="storeChannelTitle" class="store-channel-modal__title">—</h2>
          <p id="storeChannelSubtitle" class="store-channel-modal__subtitle">Verificando canais disponíveis…</p>
        </div>
        <button type="button" class="store-channel-modal__close" data-channel-dismiss aria-label="Fechar">×</button>
      </header>
      <div class="store-channel-grid" id="storeChannelOptions"></div>
      <footer class="store-channel-modal__foot">
        <button type="button" class="btn btn--ghost btn--sm" data-channel-dismiss>Cancelar</button>
      </footer>
    </div>
  </div>

  <script src="auth.js?v=6"></script>
  <script src="cache.js"></script>
  <script src="api.js?v=3"></script>
  <script src="gateway-overview.js?v=1"></script>
  <script src="stores.js?v=11"></script>
  <script src="records.js?v=15"></script>
  <script src="router.js?v=3"></script>
</body>
</html>
