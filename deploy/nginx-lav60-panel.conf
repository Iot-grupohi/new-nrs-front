# Nginx — painel LAV60 (VPS)
# /etc/nginx/sites-available/lav60-panel
#
# 1) Crie DNS A: panel.powpay.com.br → IP da VPS
# 2) Firebase Console → Authentication → Settings → Authorized domains → panel.powpay.com.br
# 3) sudo certbot --nginx -d panel.powpay.com.br

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name panel.powpay.com.br 161.97.110.117 _;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
