# Nginx ÔÇö painel LAV60 (VPS)
# /etc/nginx/sites-available/lav60-panel
#
# 1) Crie DNS A: nrs.lav60.com ÔåÆ IP da VPS (161.97.110.117)
# 2) Firebase Console ÔåÆ Authentication ÔåÆ Settings ÔåÆ Authorized domains ÔåÆ nrs.lav60.com
# 3) sudo certbot --nginx -d nrs.lav60.com

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name nrs.lav60.com 161.97.110.117 _;

    client_max_body_size 2m;

    location /api/heartbeats/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        gzip off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
